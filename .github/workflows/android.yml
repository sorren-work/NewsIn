name: Build NewsIn APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Using an older, more stable version of Linux for the build

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-dev python3-pip openjdk-17-jdk
          pip3 install --user --upgrade buildozer Cython==0.29.33

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Run buildozer in batch mode to avoid questions
          buildozer --v android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: newsin-apk
          path: bin/*.apk
